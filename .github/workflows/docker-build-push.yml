name: Build and Push Docker Image

on:
  pull_request:
    branches:
      - main   # Trigger when PR targets main

jobs:
  build:
    runs-on: ubuntu-latest
    environment: prod   # Require approval before running

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: nandanlagad/my-node-app:v2
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: prod   # Require approval before running

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Production Server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_IP }} << 'EOF'
            docker pull nandanlagad/my-node-app:v2
            docker stop my-node-app || true
            docker rm my-node-app || true
            docker run -d --name my-node-app -p 80:3000 nandanlagad/my-node-app:v2
          EOF